<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Roadmap Preview</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div class="page">
    <div th:replace="~{fragments/nav :: nav}"></div>
    <main class="container">
        <section class="card">
            <h2>Roadmap Preview</h2>
            <p class="tagline">Scan the plan, adjust if needed, then start your learning sprint.</p>
            <p class="muted">Field: <strong th:text="${draft.request.field}"></strong> | Level: <strong th:text="${draft.request.level}"></strong> |
                Duration: <strong th:text="${draft.request.durationMonths}"></strong> months</p>

            <div class="preview-actions">
                <form th:action="@{/roadmaps/start}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button class="primary-btn" type="submit">Start Learning</button>
                </form>
                <a class="ghost-btn" th:href="@{/}">Edit Inputs</a>
            </div>
        </section>

        <section class="card">
            <h3>Weekly Plan</h3>
            <div class="week-grid">
                <div class="week-card" th:each="week : ${draft.response.roadmap}">
                    <div class="week-header">
                        <span class="week-number">Week <span th:text="${week.week}"></span></span>
                        <span class="topic-title" th:text="${week.topic}"></span>
                    </div>
                    <ul class="subtopic-list">
                        <li th:each="sub : ${week.subtopics}" th:text="${sub}"></li>
                    </ul>
                    <p class="milestone"><strong>Milestone:</strong> <span th:text="${week.milestone}"></span></p>
                </div>
            </div>
        </section>
    </main>
</div>
</body>
</html>

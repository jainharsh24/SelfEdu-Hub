<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Error</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div class="page">
    <div th:replace="~{fragments/nav :: nav}"></div>
    <main class="container">
        <section class="card">
            <h2>Something went wrong</h2>
            <p class="error-message" th:text="${errorMessage}">Unexpected error.</p>
            <a class="primary-btn" th:href="@{/}">Back to Home</a>
        </section>
    </main>
</div>
</body>
</html>

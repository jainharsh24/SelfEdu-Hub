<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div class="page">
    <div th:replace="~{fragments/nav :: nav}"></div>
    <main class="container auth-container">
        <section class="card auth-card">
            <h2>Create Account</h2>
            <p class="tagline">Save your plans, track progress, and study with intention.</p>
            <div class="auth-error" th:if="${registrationError}" th:text="${registrationError}"></div>
            <form th:action="@{/register}" th:object="${registerRequest}" method="post" class="form-grid auth-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <div class="form-field">
                    <label for="username">Username</label>
                    <input id="username" type="text" th:field="*{username}" required>
                    <span class="error" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></span>
                </div>
                <div class="form-field">
                    <label for="password">Password</label>
                    <input id="password" type="password" th:field="*{password}" required>
                    <span class="error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></span>
                </div>
                <button class="primary-btn" type="submit">Register</button>
            </form>
            <p class="muted">Already have an account? <a class="link" th:href="@{/login}">Login</a></p>
        </section>
    </main>
</div>
</body>
</html>

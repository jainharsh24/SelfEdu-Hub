<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div class="page">
    <div th:replace="~{fragments/nav :: nav}"></div>
    <main class="container auth-container">
        <section class="card auth-card">
            <h2>Login</h2>
            <p class="tagline">Pick up where you left off and keep your streak steady.</p>
            <div class="auth-message" th:if="${param.registered}">
                Account created. Please log in.
            </div>
            <div class="auth-error" th:if="${param.error}">
                Invalid username or password.
            </div>
            <form th:action="@{/login}" method="post" class="form-grid auth-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <div class="form-field">
                    <label for="username">Username</label>
                    <input id="username" name="username" type="text" required>
                </div>
                <div class="form-field">
                    <label for="password">Password</label>
                    <input id="password" name="password" type="password" required>
                </div>
                <button class="primary-btn" type="submit">Login</button>
            </form>
            <p class="muted">No account? <a class="link" th:href="@{/register}">Create one</a></p>
        </section>
    </main>
</div>
</body>
</html>

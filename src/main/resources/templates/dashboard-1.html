<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Test</title>
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div class="page" th:attr="data-test-id=${testId}">
    <div th:replace="~{fragments/nav :: nav}"></div>
    <main class="container">
        <section class="card card-compact">
            <h2>Weekly Test</h2>
            <p class="muted" id="testMeta"></p>
            <p class="muted">Status: <span id="testStatus"></span></p>
            <p class="muted hidden" id="proctorSummary"></p>
        </section>

        <section class="card" id="testEmpty">
            <p class="muted">Loading test questions...</p>
        </section>

        <section class="card hidden" id="testContent">
            <div id="questionsContainer"></div>
            <div class="test-actions">
                <button class="primary-btn" type="button" id="submitTest">Submit Test</button>
                <a class="ghost-btn" th:href="@{/dashboard-2}">Back</a>
            </div>
            <p class="error-message" id="testError"></p>
        </section>
    </main>
</div>

<div class="test-modal-overlay is-active" id="examGuardOverlay"></div>
<div class="test-modal is-active" id="examGuardModal">
    <div class="test-modal-header">
        <h3 id="examGuardTitle">Start Test</h3>
    </div>
    <p class="test-modal-text" id="examGuardMessage">
        Before starting: allow camera, enter full-screen mode, and keep this test tab active until submit.
    </p>
    <div class="camera-preview-wrap">
        <video id="cameraPreview" class="camera-preview hidden" autoplay muted playsinline></video>
        <p class="muted" id="cameraStatus">Camera check pending.</p>
    </div>
    <p class="muted" id="violationStatus">Violations: 0 / 3</p>
    <div class="test-modal-actions">
        <button class="primary-btn" type="button" id="startTestBtn">Yes, Start Test</button>
        <a class="ghost-btn" th:href="@{/dashboard-2}">Cancel</a>
    </div>
    <p class="error-message" id="proctorError"></p>
</div>

<script th:src="@{/js/single-action.js}"></script>
<script>
    const testPageRoot = document.querySelector('.page');
    const submitButton = document.getElementById('submitTest');
    const errorLabel = document.getElementById('testError');
    let testId = testPageRoot ? testPageRoot.dataset.testId : null;
    if (!testId) {
        const params = new URLSearchParams(window.location.search);
        testId = params.get('testId');
    }
    const testMeta = document.getElementById('testMeta');
    const testStatus = document.getElementById('testStatus');
    const testEmpty = document.getElementById('testEmpty');
    const testContent = document.getElementById('testContent');
    const questionsContainer = document.getElementById('questionsContainer');
    const csrfToken = document.querySelector('meta[name="_csrf"]')?.getAttribute('content');
    const csrfHeader = document.querySelector('meta[name="_csrf_header"]')?.getAttribute('content');
    const proctorSummary = document.getElementById('proctorSummary');
    const examGuardOverlay = document.getElementById('examGuardOverlay');
    const examGuardModal = document.getElementById('examGuardModal');
    const startTestBtn = document.getElementById('startTestBtn');
    const proctorError = document.getElementById('proctorError');
    const violationStatus = document.getElementById('violationStatus');
    const cameraStatus = document.getElementById('cameraStatus');
    const cameraPreview = document.getElementById('cameraPreview');

    const MAX_VIOLATIONS = 3;
    let violationCount = 0;
    let examStarted = false;
    let isSubmitting = false;
    let cameraStream = null;
    let proctorEnabled = false;

    function updateProctorSummary() {
        if (!proctorSummary) {
            return;
        }
        proctorSummary.classList.remove('hidden');
        proctorSummary.textContent = proctorEnabled
            ? `Proctoring active. Violations: ${violationCount}/${MAX_VIOLATIONS}.`
            : 'Proctoring could not start. Test continues without camera/tab monitoring.';
    }

    function setViolationStatus() {
        if (violationStatus) {
            violationStatus.textContent = `Violations: ${violationCount} / ${MAX_VIOLATIONS}`;
        }
        updateProctorSummary();
    }

    function stopCameraStream() {
        if (!cameraStream) {
            return;
        }
        cameraStream.getTracks().forEach(track => track.stop());
        cameraStream = null;
    }

    async function requestFullscreenMode() {
        if (!document.fullscreenElement && document.documentElement.requestFullscreen) {
            await document.documentElement.requestFullscreen();
        }
    }

    async function initCameraCheck() {
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            if (cameraStatus) {
                cameraStatus.textContent = 'Camera API not available in this browser.';
            }
            return false;
        }
        try {
            cameraStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
            if (cameraPreview) {
                cameraPreview.srcObject = cameraStream;
                cameraPreview.classList.remove('hidden');
            }
            if (cameraStatus) {
                cameraStatus.textContent = 'Camera connected.';
            }
            return true;
        } catch (err) {
            if (cameraStatus) {
                cameraStatus.textContent = 'Camera permission denied or unavailable.';
            }
            return false;
        }
    }

    function hideGuardModal() {
        if (examGuardModal) {
            examGuardModal.classList.remove('is-active');
        }
        if (examGuardOverlay) {
            examGuardOverlay.classList.remove('is-active');
        }
    }

    function markViolation(reason) {
        if (!examStarted || isSubmitting || !proctorEnabled) {
            return;
        }
        violationCount += 1;
        setViolationStatus();
        if (errorLabel) {
            errorLabel.textContent = `${reason} (${violationCount}/${MAX_VIOLATIONS}).`;
        }
        if (violationCount >= MAX_VIOLATIONS) {
            if (errorLabel) {
                errorLabel.textContent = 'Maximum violations reached. Submitting test automatically.';
            }
            submitTest(true);
        }
    }

    function setLoadingState(message) {
        if (testEmpty) {
            testEmpty.classList.remove('hidden');
            testEmpty.querySelector('p').textContent = message;
        }
        if (testContent) {
            testContent.classList.add('hidden');
        }
    }

    function setReadyState() {
        if (testEmpty) {
            testEmpty.classList.add('hidden');
        }
        if (testContent) {
            testContent.classList.remove('hidden');
        }
    }

    let currentStatus = '';
    let pendingSaveTimeout = null;

    function renderQuestions(questions) {
        if (!questionsContainer) {
            return;
        }
        questionsContainer.innerHTML = '';
        questions.forEach((question, index) => {
            const card = document.createElement('div');
            card.className = 'question-card';

            const title = document.createElement('div');
            title.className = 'question-title';
            title.textContent = `${index + 1}. ${question.question}`;
            card.appendChild(title);

            const optionList = document.createElement('div');
            optionList.className = 'option-list';
            (question.options || []).forEach(option => {
                const label = document.createElement('label');
                label.className = 'option-item';

                const input = document.createElement('input');
                input.type = 'radio';
                input.name = `q_${question.id}`;
                input.value = option;
                if (question.userAnswer && question.userAnswer === option) {
                    input.checked = true;
                }
                if (currentStatus === 'COMPLETED') {
                    input.disabled = true;
                }

                const span = document.createElement('span');
                span.textContent = option;

                label.appendChild(input);
                label.appendChild(span);
                optionList.appendChild(label);
            });

            card.appendChild(optionList);
            questionsContainer.appendChild(card);
        });

        if (currentStatus !== 'COMPLETED') {
            const inputs = questionsContainer.querySelectorAll('input[type="radio"]');
            inputs.forEach(input => {
                input.addEventListener('change', () => {
                    scheduleDraftSave(input.name, input.value);
                });
            });
        }
    }

    function scheduleDraftSave(questionName, value) {
        if (!questionName || !value || currentStatus === 'COMPLETED') {
            return;
        }
        if (pendingSaveTimeout) {
            clearTimeout(pendingSaveTimeout);
        }
        pendingSaveTimeout = setTimeout(() => {
            const questionId = Number(questionName.replace('q_', ''));
            if (!questionId) {
                return;
            }
            saveDraftAnswers([{ questionId, userAnswer: value }]);
        }, 300);
    }

    async function saveDraftAnswers(answers) {
        if (!testId || currentStatus === 'COMPLETED') {
            return;
        }
        const headers = {
            'Content-Type': 'application/json'
        };
        if (csrfToken && csrfHeader) {
            headers[csrfHeader] = csrfToken;
        }
        try {
            const response = await fetch(`/tests/${testId}/save`, {
                method: 'POST',
                headers,
                credentials: 'same-origin',
                body: JSON.stringify({ answers })
            });
            if (response.ok) {
                const payload = await response.json().catch(() => null);
                if (payload?.status) {
                    currentStatus = payload.status;
                }
            }
        } catch (err) {
            // Silent for background save.
        }
    }

    async function loadTest() {
        if (!testId) {
            setLoadingState('Missing test id.');
            return;
        }
        setLoadingState('Loading test questions...');
        try {
            const response = await fetch(`/tests/${testId}/take`, {
                method: 'GET',
                credentials: 'same-origin'
            });
            if (!response.ok) {
                const payload = await response.json().catch(() => ({}));
                const message = payload?.error || 'Failed to load test.';
                if (response.status === 409 && testId) {
                    window.location.href = `/dashboard-3?testId=${testId}`;
                    return;
                }
                throw new Error(message);
            }
            const test = await response.json();
            if (testMeta) {
                const testNumber = test.testNumber ? `Test ${test.testNumber}` : `Week ${test.weekNumber}`;
                testMeta.textContent = `${test.roadmapName} | ${test.topicName} | ${testNumber}`;
            }
            if (testStatus) {
                testStatus.textContent = test.status || '';
            }
            currentStatus = test.status || '';
            if (!test.questions || test.questions.length === 0) {
                setLoadingState('No questions available yet. Please try again later.');
                return;
            }
            renderQuestions(test.questions);
            setReadyState();
            if (currentStatus === 'COMPLETED' && submitButton) {
                submitButton.disabled = true;
                submitButton.textContent = 'Test Completed';
            }
        } catch (err) {
            setLoadingState(err.message);
        }
    }

    async function submitTest() {
        if (!testId || !submitButton) {
            return;
        }
        isSubmitting = true;
        if (window.SingleAction && !window.SingleAction.start(submitButton, 'Submitting...')) {
            isSubmitting = false;
            return;
        }
        submitButton.disabled = true;
        if (errorLabel) {
            errorLabel.textContent = '';
        }

        const answers = [];
        const questions = document.querySelectorAll('[name^="q_"]');
        const processed = new Set();
        questions.forEach(input => {
            processed.add(input.name);
        });

        processed.forEach(name => {
            const questionId = Number(name.replace('q_', ''));
            const selected = document.querySelector(`input[name="${name}"]:checked`);
            if (questionId) {
                answers.push({
                    questionId,
                    userAnswer: selected ? selected.value : null
                });
            }
        });

        const headers = {
            'Content-Type': 'application/json'
        };
        if (csrfToken && csrfHeader) {
            headers[csrfHeader] = csrfToken;
        }

        try {
            const response = await fetch(`/tests/${testId}/submit`, {
                method: 'POST',
                headers,
                credentials: 'same-origin',
                body: JSON.stringify({ answers })
            });
            if (!response.ok) {
                const payload = await response.json().catch(() => ({}));
                const message = payload?.error || 'Failed to submit test.';
                if (response.status === 409 && testId) {
                    stopCameraStream();
                    window.location.href = `/dashboard-3?testId=${testId}`;
                    return;
                }
                throw new Error(message);
            }
            stopCameraStream();
            window.location.href = `/dashboard-3?testId=${testId}`;
        } catch (err) {
            if (errorLabel) {
                errorLabel.textContent = err.message;
            }
            if (currentStatus !== 'COMPLETED' && window.SingleAction) {
                window.SingleAction.finish(submitButton);
            }
            isSubmitting = false;
        }
    }

    async function startExamSession() {
        if (startTestBtn && window.SingleAction && !window.SingleAction.start(startTestBtn, 'Starting...')) {
            return;
        }
        if (proctorError) {
            proctorError.textContent = '';
        }
        let fullscreenOk = false;
        let cameraOk = false;
        try {
            await requestFullscreenMode();
            fullscreenOk = !!document.fullscreenElement;
        } catch (err) {
            fullscreenOk = false;
        }
        cameraOk = await initCameraCheck();
        if (!fullscreenOk || !cameraOk) {
            if (proctorError) {
                proctorError.textContent = 'Need fullscreen and camera access to start this guarded test.';
            }
            if (window.SingleAction) {
                window.SingleAction.finish(startTestBtn);
            }
            return;
        }
        proctorEnabled = true;
        examStarted = true;
        setViolationStatus();
        updateProctorSummary();
        hideGuardModal();
    }

    document.addEventListener('visibilitychange', () => {
        if (document.hidden) {
            markViolation('You switched away from the test tab');
        }
    });

    window.addEventListener('blur', () => {
        if (!document.hidden) {
            markViolation('Window focus lost');
        }
    });

    document.addEventListener('fullscreenchange', () => {
        if (examStarted && !document.fullscreenElement) {
            markViolation('Fullscreen mode exited');
        }
    });

    document.addEventListener('contextmenu', event => {
        if (!examStarted) {
            return;
        }
        event.preventDefault();
    });

    if (submitButton) {
        submitButton.addEventListener('click', submitTest);
    }
    if (startTestBtn) {
        startTestBtn.addEventListener('click', startExamSession);
    }

    loadTest();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<body>
<nav class="nav" th:fragment="nav">
    <div class="brand">Study Roadmap</div>
    <div class="nav-links">
        <a th:href="@{/}">Home</a>
        <a th:href="@{/dashboard}">Learning</a>
        <a th:href="@{/dashboard-2}" sec:authorize="isAuthenticated()">Tests</a>
        <div class="nav-auth" sec:authorize="isAuthenticated()">
            <span class="nav-user" sec:authentication="name"></span>
            <form th:action="@{/logout}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button class="ghost-btn" type="submit">Logout</button>
            </form>
        </div>
        <div class="nav-auth" sec:authorize="!isAuthenticated()">
            <a th:href="@{/login}">Login</a>
            <a th:href="@{/register}">Register</a>
        </div>
    </div>
</nav>
</body>
</html>

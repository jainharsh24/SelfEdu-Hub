<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Profile</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div class="page">
    <div th:replace="~{fragments/nav :: nav}"></div>
    <main class="container profile-page">
        <section class="profile-hero">
            <div>
                <p class="dashboard-kicker">Profile</p>
                <h1 th:text="${profile.username}">username</h1>
                <p class="profile-joined">
                    Joined on <span th:text="${#temporals.format(profile.joinedDate, 'dd MMM yyyy')}">01 Jan 2026</span>
                </p>
            </div>
            <aside class="theme-hero-panel profile-hero-panel">
                <p class="theme-hero-panel-label">Profile Snapshot</p>
                <div class="theme-hero-panel-item">
                    <strong th:text="${profile.totalTests}">0</strong>
                    <span>Total tests across all roadmaps</span>
                </div>
                <p class="theme-hero-panel-note">Performance trends now live in the Analytics Dashboard.</p>
                <a class="ghost-btn dashboard-hero-ghost" th:href="@{/dashboard-main}">Open Analytics</a>
            </aside>
        </section>

        <div class="auth-message" th:if="${passwordSuccess}" th:text="${passwordSuccess}"></div>

        <section class="card">
            <div class="dashboard-section-header">
                <div>
                    <p class="dashboard-kicker">Achievements</p>
                    <h2>Your learning milestones</h2>
                </div>
            </div>
            <div class="profile-achievement-grid">
                <article class="profile-achievement-card">
                    <span>Best Score</span>
                    <strong><span th:text="${#numbers.formatDecimal(profile.bestScore, 1, 2)}">0.00</span>%</strong>
                </article>
                <article class="profile-achievement-card">
                    <span>Milestones Completed</span>
                    <strong th:text="${profile.milestonesCompleted}">0</strong>
                </article>
            </div>
        </section>

        <section class="card profile-account-actions">
            <div class="dashboard-section-header">
                <div>
                    <p class="dashboard-kicker">Account Actions</p>
                    <h2>Manage your account</h2>
                </div>
            </div>
            <div class="profile-actions">
                <a class="ghost-btn" th:href="@{/settings}">Settings</a>
                <form th:action="@{/logout}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button class="danger-btn" type="submit">Logout</button>
                </form>
            </div>
        </section>
    </main>
</div>
</body>
</html>
